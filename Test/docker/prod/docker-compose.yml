name: bluebolt-prod

# Using existing PostgreSQL on port 5437 (container: pg_thuchi)

services:
  # Backend API (Production with PM2)
  backend:
    image: bluebolt-backend:latest
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile.backend
    container_name: bluebolt-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5001}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_uploads_prod:/app/uploads
    networks:
      - bluebolt-network-prod
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Production with server.cjs + PM2)
  frontend:
    image: bluebolt-frontend:latest
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: bluebolt-frontend-prod
    restart: always
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bluebolt-network-prod
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backend_uploads_prod:

networks:
  bluebolt-network-prod:
    driver: bridge
